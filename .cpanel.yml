---
deployment:
  tasks:
    - export DEPLOYPATH=/home/username/pusatvillabali/
    - /bin/cp -rf * $DEPLOYPATH
    - cd $DEPLOYPATH && composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs
    - cd $DEPLOYPATH && php artisan config:clear
    - cd $DEPLOYPATH && php artisan route:clear
    - cd $DEPLOYPATH && php artisan view:clear
    - cd $DEPLOYPATH && php artisan migrate --force
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan view:cache
    - cd $DEPLOYPATH && php artisan storage:link || true
    - cd $DEPLOYPATH && chmod -R 775 storage bootstrap/cache
